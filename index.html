<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Currency Converter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );
}

.container{
    width:420px;
    padding:30px;
    border-radius:25px;

    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.3);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    font-size:16px;
}

.currency-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
}

select{
    width:45%;
    padding:12px;
    border:none;
    border-radius:12px;
    font-size:15px;
    cursor:pointer;
}

.swap-btn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#38bdf8;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.swap-btn:hover{
    transform:rotate(180deg);
}

.convert-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.convert-btn:hover{
    opacity:0.9;
}

.rate{
    margin-top:20px;
    text-align:center;
    color:#cbd5e1;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.footer{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    color:#cbd5e1;
}

.logo{
    font-size:70px;
    text-align:center;
    margin-bottom:10px;
    animation:float 3s ease-in-out infinite;
}

.tagline{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
    font-size:14px;
    letter-spacing:1px;
}

@keyframes float{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        💱 
    </div>

    <h1>CurrencyPilot</h1>

    <p class="tagline">
        AI-Powered Real-Time Currency Converter
    </p>
    

    <div class="input-group">
        <input
            type="number"
            id="amount"
            placeholder="Enter Amount"
        >
    </div>

    <div class="currency-row">

        <select id="fromCurrency"></select>

        <button class="swap-btn" id="swapBtn">
            ⇄
        </button>

        <select id="toCurrency"></select>

    </div>

    <button class="convert-btn" id="convertBtn">
        Convert Currency
    </button>

    <div class="rate" id="rateInfo"></div>

    <div class="result" id="result">
        Conversion Result
    </div>

    <div class="footer">
        Real-time exchange rates 🌍
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
